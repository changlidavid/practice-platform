services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: practice-web
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      PRACTICE_HOME: ${PRACTICE_HOME:-/data}
      PRACTICE_HIDDEN_TESTS_ROOT: ${PRACTICE_HIDDEN_TESTS_ROOT:-/opt/practice-hidden-tests}
      OTP_DEV_MODE: ${OTP_DEV_MODE:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    volumes:
      # Development mode: use host data directly for fast iteration.
      - ./.practice:/data
      - ./.server-hidden-tests:/opt/practice-hidden-tests:ro
    restart: unless-stopped
