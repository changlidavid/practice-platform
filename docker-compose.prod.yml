services:
  web:
    environment:
      OTP_DEV_MODE: ${OTP_DEV_MODE:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    volumes:
      - practice_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/login', timeout=3).getcode() < 500 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  practice_data:
    name: practice_data
